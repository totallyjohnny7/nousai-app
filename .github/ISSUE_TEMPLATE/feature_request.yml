name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What feature would you like?
      placeholder: Describe the feature
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: Why do you need this? What problem does it solve?
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: How should this work? Include mockups or examples if possible.

  - type: dropdown
    id: complexity
    attributes:
      label: Estimated Complexity
      description: This determines which AI model handles the issue (Sonnet for standard, Opus for complex)
      options:
        - Standard (UI change, bug fix, small feature)
        - Complex (architecture, refactor, security, migration, performance)
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Flashcards / FSRS
        - Omni Protocol
        - AI Tools
        - Sync / Cloud
        - UI / Design
        - Japanese Mode
        - Gamification
        - Hardware (Stream Deck / K20)
        - Omi Wearable
        - Canvas LMS
        - Mobile (Capacitor)
        - Other
    validations:
      required: true
