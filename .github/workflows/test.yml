name: E2E Tests (Cloud)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  # Manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: [chromium, mobile]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Build app
        run: npm run build

      - name: Start preview server & run tests
        run: |
          # Start a local preview of the built app
          npx vite preview --port 4173 &
          sleep 3

          # Run Playwright tests against the local preview
          npx playwright test --project=${{ matrix.project }} --reporter=html
        env:
          VITE_BASE_URL: http://localhost:4173
          CI: true

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ matrix.project }}
          path: playwright-report/
          retention-days: 14

      - name: Upload failure screenshots & videos
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-failures-${{ matrix.project }}
          path: test-results/
          retention-days: 14

  # Also test against live production URL
  test-production:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: [chromium, mobile]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Run tests against production
        run: npx playwright test --project=${{ matrix.project }} --reporter=html
        env:
          VITE_BASE_URL: https://nousai-app.vercel.app
          CI: true

      - name: Upload production test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: production-report-${{ matrix.project }}
          path: playwright-report/
          retention-days: 14

      - name: Upload production failure screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: production-failures-${{ matrix.project }}
          path: test-results/
          retention-days: 14
