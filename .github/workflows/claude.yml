name: Claude Code

on:
  issue_comment:
    types: [created]
  issues:
    types: [opened]

jobs:
  select-model:
    runs-on: ubuntu-latest
    outputs:
      model: ${{ steps.select_model.outputs.model }}
    steps:
      - name: Select model based on complexity
        id: select_model
        env:
          TITLE: ${{ github.event.issue.title || '' }}
          BODY: ${{ github.event.issue.body || github.event.comment.body || '' }}
        run: |
          COMBINED="$TITLE $BODY"
          if echo "$COMBINED" | grep -iE "architect|refactor|redesign|complex|performance|security|migrate|overhaul|rebuild|pipeline|infrastructure|system.design|breaking.change|rework" > /dev/null; then
            echo "model=claude-opus-4-6" >> $GITHUB_OUTPUT
            echo "Selected: Opus (complex task detected)"
          else
            echo "model=claude-sonnet-4-6" >> $GITHUB_OUTPUT
            echo "Selected: Sonnet (standard task)"
          fi

  claude:
    needs: select-model
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code
        uses: anthropics/claude-code-action@beta
        with:
          model: ${{ needs.select-model.outputs.model }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          trigger_phrase: "@claude"