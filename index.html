<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#6366f1" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <title>NousAI</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- Force-clear stale PWA cache on deploy. Runs BEFORE React loads. -->
    <script>
      (function(){
        var V='nousai-code-v';
        var CURRENT='2026-03-28b';
        if(localStorage.getItem(V)!==CURRENT){
          localStorage.setItem(V,CURRENT);
          if('serviceWorker' in navigator){
            navigator.serviceWorker.getRegistrations().then(function(r){
              r.forEach(function(x){x.unregister()});
            });
          }
          if('caches' in window){
            caches.keys().then(function(k){
              k.forEach(function(n){caches.delete(n)});
            });
          }
          setTimeout(function(){location.reload()},500);
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
